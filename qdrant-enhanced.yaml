# mcp-server-qdrant-enhanced — canonical configuration
# =====================================================
# Priority: CLI args > environment variables > this file > built-in defaults.
#
# Supported paths (first found wins):
#   1. $QDRANT_CONFIG
#   2. ./qdrant-enhanced.yaml
#   3. ~/.config/mcp-server-qdrant/config.yaml

# ── Runtime ────────────────────────────────────────────────────────────────
runtime:
  qdrant_mode: server               # server | embedded
  qdrant_url: http://127.0.0.1:6333 # Qdrant server URL (server mode)
  # qdrant_local_path: .local/qdrant-storage  # embedded mode only
  mcp_transport: streamable-http
  mcp_host: 127.0.0.1
  mcp_port: 8000
  mcp_tool_profile: canonical        # minimal | canonical | full
  read_only: false

# ── Models ─────────────────────────────────────────────────────────────────
models:
  dense_embedding: Qwen/Qwen3-Embedding-4B
  embedding_provider: fastembed
  embedding_device: auto
  sparse_embedding: Qdrant/bm25       # or Qdrant/bm42-all-minilm-l6-v2-attentions
  late_interaction: colbert-ir/colbertv2.0
  reranker: Xenova/ms-marco-MiniLM-L-6-v2
  reranker_instruction: null          # task instruction for Qwen3 rerankers (optional)
  # reranker_providers override (env: QDRANT_RERANKER_PROVIDERS)
  reranker_providers:
    - CPUExecutionProvider

  # Qwen3 sidecar (Rust binary for optimal Apple Silicon performance)
  qwen3:
    max_length: 1024
    dtype: auto
    response_limit_bytes: 67108864   # 64 MiB

# ── Ingest ─────────────────────────────────────────────────────────────────
ingest:
  chunk_size: 700
  chunk_overlap: 70
  embedding_batch_size: 4
  write_max_concurrency: 1
  write_queue_size: 8

# ── Search ─────────────────────────────────────────────────────────────────
search:
  # Default mode when mode is omitted from search_documents.
  # 'auto' picks based on collection type:
  #   dense collection       → dense
  #   hybrid collection      → hybrid
  #   late_interaction col.  → late_interaction
  default_mode: auto

  rerank_prefetch_limit: 100          # 0 = auto
  rerank_top_k: 0                     # 0 = all prefetched
  diversity_max_chunks_per_page: 2    # for rerank diversity pass

# ── Collections ────────────────────────────────────────────────────────────
collections:
  default_collection: documents_hybrid
  naming:
    hybrid_suffix: _hybrid
    late_interaction_suffix: _li

# ── Benchmark ──────────────────────────────────────────────────────────────
# Used by scripts/benchmark_modes.py and scripts/benchmark_split.py.
benchmark:
  warmup_runs: 1
  measured_runs: 10
  include_cold_start: true
